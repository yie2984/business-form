<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尚鋐消防 - 業務登記表單</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .home-container {
            text-align: center;
            padding: 60px 20px;
        }
        .home-container h1 {
            color: #6D4C41;
            font-size: 32px;
            margin-bottom: 20px;
        }
        .home-container p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .home-container a {
            display: inline-block;
            padding: 15px 40px;
            background: #8D6E63;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            transition: all 0.2s;
        }
        .home-container a:hover {
            background: #6D4C41;
            box-shadow: 0 4px 12px rgba(141, 110, 99, 0.4);
        }
    </style>
</head>
<body>
    <div class="home-container">
