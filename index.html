<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尚鋐消防 - 業務登記表單</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fdf5f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .home-container {
            text-align: center;
            padding: 80px 20px;
        }
        .home-container h1 {
            color: #6d4c41;
            font-size: 36px;
            margin-bottom: 25px;
        }
        .home-container p {
            color: #8d6e63;
            font-size: 18px;
            margin-bottom: 40px;
        }
        .home-container a {
            display: inline-block;
            padding: 18px 50px;
            background: #8d6e63;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 20px;
            transition: all 0.2s;
        }
        .home-container a:hover {
            background: #6d4c41;
            box-shadow: 0 6px 20px rgba(141, 110, 99, 0.5);
        }
    </style>
</head>
<body>
    <div class="home-container">
        <h1>尚鋐消防有限公司</h1>
